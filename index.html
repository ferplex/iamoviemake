<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Video Sequencer</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #0a0a0a;
    color: #e0e0e0;
    min-height: 100vh;
    padding: 20px;
  }
  .container { max-width: 1200px; margin: 0 auto; }
  header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding-bottom: 20px;
    border-bottom: 1px solid #1a1a1a;
    margin-bottom: 20px;
  }
  header h1 { font-size: 18px; font-weight: 500; }
  .tabs { display: flex; gap: 2px; background: #111; padding: 3px; border-radius: 6px; }
  .tab {
    padding: 7px 14px;
    background: transparent;
    border: none;
    color: #666;
    cursor: pointer;
    border-radius: 4px;
    font-size: 12px;
  }
  .tab.active { background: #222; color: #fff; }

  .view { display: none; }
  .view.active { display: block; }

  .grid {
    display: grid;
    grid-template-columns: 360px 1fr;
    gap: 20px;
  }
  .panel {
    background: #111;
    border: 1px solid #1a1a1a;
    border-radius: 8px;
    padding: 18px;
  }
  .panel h2 {
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: #666;
    margin-bottom: 12px;
    font-weight: 500;
  }
  .section { margin-bottom: 20px; }

  .upload-area {
    border: 1px dashed #2a2a2a;
    border-radius: 6px;
    padding: 18px;
    text-align: center;
    cursor: pointer;
    transition: 0.2s;
    background: #0a0a0a;
  }
  .upload-area:hover { border-color: #444; }
  .upload-area p { font-size: 12px; color: #999; }

  .options { display: grid; grid-template-columns: repeat(2, 1fr); gap: 6px; }
  .opt-btn {
    padding: 9px;
    background: #0a0a0a;
    border: 1px solid #1a1a1a;
    color: #888;
    border-radius: 5px;
    cursor: pointer;
    font-size: 12px;
  }
  .opt-btn:hover { border-color: #333; color: #ccc; }
  .opt-btn.active { background: #fff; color: #000; border-color: #fff; }

  .render-btn {
    width: 100%;
    padding: 12px;
    background: #fff;
    color: #000;
    border: none;
    border-radius: 6px;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    margin-top: 8px;
  }
  .render-btn:hover { background: #ddd; }
  .render-btn:disabled { background: #222; color: #555; cursor: not-allowed; }

  .preview-wrap {
    background: #000;
    border-radius: 6px;
    overflow: hidden;
    position: relative;
    aspect-ratio: 16/9;
  }
  #preview { width: 100%; height: 100%; display: block; }
  .placeholder { color: #333; font-size: 12px; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); }

  .timeline {
    display: flex;
    gap: 5px;
    padding: 10px;
    background: #0a0a0a;
    border-radius: 6px;
    overflow-x: auto;
    min-height: 80px;
    margin-top: 10px;
  }
  .thumb {
    flex-shrink: 0;
    width: 80px;
    height: 58px;
    border-radius: 3px;
    background: #1a1a1a;
    position: relative;
    overflow: hidden;
    border: 1px solid #1a1a1a;
    cursor: grab;
  }
  .thumb.dragging { opacity: 0.4; }
  .thumb.drag-over { border-color: #fff; }
  .thumb img { width: 100%; height: 100%; object-fit: cover; pointer-events: none; }
  .thumb .num {
    position: absolute;
    top: 2px;
    left: 2px;
    background: rgba(0,0,0,0.9);
    color: #fff;
    font-size: 9px;
    padding: 2px 4px;
    border-radius: 2px;
  }
  .thumb .del {
    position: absolute;
    top: 2px;
    right: 2px;
    background: rgba(0,0,0,0.9);
    color: #ff4444;
    border: none;
    width: 16px;
    height: 16px;
    border-radius: 2px;
    cursor: pointer;
    font-size: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .progress {
    width: 100%;
    height: 2px;
    background: #1a1a1a;
    border-radius: 1px;
    margin-top: 10px;
    overflow: hidden;
    display: none;
  }
  .progress.active { display: block; }
  .progress-bar {
    height: 100%;
    background: #fff;
    width: 0%;
    transition: width 0.1s linear;
  }
  .status {
    font-size: 11px;
    color: #555;
    margin-top: 6px;
    text-align: center;
  }
  .info-row {
    display: flex;
    justify-content: space-between;
    font-size: 11px;
    color: #666;
    margin-top: 6px;
  }
  .empty-timeline {
    color: #333;
    font-size: 11px;
    width: 100%;
    text-align: center;
    align-self: center;
  }

  /* Gallery */
  .gallery-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
    gap: 14px;
  }
  .gallery-item {
    background: #111;
    border: 1px solid #1a1a1a;
    border-radius: 6px;
    overflow: hidden;
  }
  .gallery-item video {
    width: 100%;
    aspect-ratio: 16/9;
    background: #000;
    display: block;
  }
  .gallery-info {
    padding: 10px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 11px;
    color: #888;
  }
  .gallery-info button {
    background: #222;
    border: 1px solid #333;
    color: #ccc;
    padding: 4px 10px;
    border-radius: 4px;
    cursor: pointer;
    font-size: 11px;
  }
  .gallery-info button:hover { background: #333; }
  .gallery-empty {
    text-align: center;
    padding: 60px 20px;
    color: #444;
    font-size: 12px;
  }
  .gallery-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 16px;
  }
  .gallery-header h2 {
    font-size: 14px;
    font-weight: 500;
    color: #ccc;
  }
  .clear-btn {
    background: transparent;
    border: 1px solid #222;
    color: #666;
    padding: 5px 12px;
    border-radius: 4px;
    cursor: pointer;
    font-size: 11px;
  }
  .clear-btn:hover { color: #ff5555; border-color: #ff5555; }

  /* Sequencer view */
  .seq-controls {
    display: flex;
    gap: 8px;
    margin-bottom: 14px;
  }
  .seq-controls button {
    background: #0a0a0a;
    border: 1px solid #1a1a1a;
    color: #aaa;
    padding: 7px 14px;
    border-radius: 5px;
    cursor: pointer;
    font-size: 12px;
  }
  .seq-controls button:hover { border-color: #444; color: #fff; }
  .seq-info {
    font-size: 11px;
    color: #555;
    margin-bottom: 10px;
  }
</style>
</head>
<body>
<div class="container">
  <header>
    <h1>Video Sequencer</h1>
    <div class="tabs">
      <button class="tab active" data-view="generator">Generator</button>
      <button class="tab" data-view="sequencer">Sequencer</button>
      <button class="tab" data-view="gallery">Gallery</button>
    </div>
  </header>

  <!-- GENERATOR -->
  <div class="view active" id="view-generator">
    <div class="grid">
      <div class="panel">
        <div class="section">
          <h2>Imágenes</h2>
          <label class="upload-area" for="imgInput">
            <p>Subir ZIP o imágenes</p>
          </label>
          <input type="file" id="imgInput" multiple accept=".zip,image/*" style="display:none">
          <div class="info-row">
            <span id="imgCount">0 imágenes</span>
            <span id="frameTime">—</span>
          </div>
        </div>

        <div class="section">
          <h2>Subtítulos</h2>
          <label class="upload-area" for="subInput" style="padding: 12px;">
            <p style="font-size:11px;">.txt (tiempo | texto)</p>
          </label>
          <input type="file" id="subInput" accept=".txt" style="display:none">
        </div>

        <div class="section">
          <h2>Duración</h2>
          <div class="options" id="durOptions">
            <button class="opt-btn active" data-val="5">5s</button>
            <button class="opt-btn" data-val="10">10s</button>
          </div>
        </div>

        <div class="section">
          <h2>FPS</h2>
          <div class="options" id="fpsOptions">
            <button class="opt-btn active" data-val="24">24</button>
            <button class="opt-btn" data-val="30">30</button>
          </div>
        </div>

        <button class="render-btn" id="renderBtn">Renderizar</button>
        <div class="progress" id="progress"><div class="progress-bar" id="progressBar"></div></div>
        <div class="status" id="status">Listo</div>
      </div>

      <div class="panel">
        <h2>Preview</h2>
        <div class="preview-wrap">
          <canvas id="preview" width="1280" height="720"></canvas>
          <span class="placeholder" id="placeholder">Sin imágenes</span>
        </div>

        <h2 style="margin-top:18px;">Timeline <span id="timelineCount" style="color:#444;font-weight:normal;"></span></h2>
        <div class="timeline" id="timeline">
          <div class="empty-timeline">Vacío</div>
        </div>
      </div>
    </div>
  </div>

  <!-- SEQUENCER -->
  <div class="view" id="view-sequencer">
    <div class="panel">
      <div class="gallery-header">
        <h2>Secuencia de Frames</h2>
        <div class="seq-controls">
          <button id="seqReverse">Invertir orden</button>
          <button id="seqClear">Limpiar todo</button>
        </div>
      </div>
      <div class="seq-info">Arrastra los frames para reordenarlos. Los cambios afectan el renderizado.</div>
      <div class="timeline" id="seqTimeline" style="min-height: 120px;">
        <div class="empty-timeline">Sin frames</div>
      </div>
      <div class="info-row" style="margin-top: 14px;">
        <span id="seqInfo">0 frames</span>
        <span id="seqTime">—</span>
      </div>
    </div>
  </div>

  <!-- GALLERY -->
  <div class="view" id="view-gallery">
    <div class="panel">
      <div class="gallery-header">
        <h2>Videos Generados</h2>
        <button class="clear-btn" id="clearGallery">Limpiar</button>
      </div>
      <div class="gallery-grid" id="galleryGrid">
        <div class="gallery-empty">Sin videos aún</div>
      </div>
    </div>
  </div>
</div>

<script>
const state = {
  images: [],
  subtitles: [],
  duration: 5,
  fps: 24,
  gallery: []
};

const canvas = document.getElementById('preview');
const ctx = canvas.getContext('2d');
const timeline = document.getElementById('timeline');
const status = document.getElementById('status');
const progress = document.getElementById('progress');
const progressBar = document.getElementById('progressBar');
const placeholder = document.getElementById('placeholder');

ctx.fillStyle = '#000';
ctx.fillRect(0, 0, canvas.width, canvas.height);

// === TABS ===
document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
    tab.classList.add('active');
    document.getElementById('view-' + tab.dataset.view).classList.add('active');
    if (tab.dataset.view === 'sequencer') renderSequencer();
    if (tab.dataset.view === 'gallery') renderGallery();
  });
});

// === UTILS ===
function loadImage(src) {
  return new Promise((res, rej) => {
    const img = new Image();
    img.onload = () => res(img);
    img.onerror = rej;
    img.src = src;
  });
}

function arrayBufferToDataURL(buffer, mime) {
  const bytes = new Uint8Array(buffer);
  let binary = '';
  for (let i = 0; i < bytes.length; i++) binary += String.fromCharCode(bytes[i]);
  return 'data:' + mime + ';base64,' + btoa(binary);
}

function isImageFile(name) {
  return /\.(png|jpe?g|webp|bmp|gif)$/i.test(name);
}

// === LOAD IMAGES ===
document.getElementById('imgInput').addEventListener('change', async (e) => {
  const files = Array.from(e.target.files);
  if (!files.length) return;

  state.images = [];
  status.textContent = 'Cargando...';

  try {
    const zipFile = files.find(f => f.name.toLowerCase().endsWith('.zip'));
    if (zipFile) {
      status.textContent = 'Extrayendo...';
      const zip = await JSZip.loadAsync(zipFile);
      const imageFiles = [];

      zip.forEach((path, entry) => {
        if (!entry.dir && isImageFile(path)) {
          imageFiles.push({ path, entry });
        }
      });

      imageFiles.sort((a, b) => a.path.localeCompare(b.path, undefined, { numeric: true }));

      const BATCH = 20;
      for (let i = 0; i < imageFiles.length; i += BATCH) {
        const batch = imageFiles.slice(i, i + BATCH);
        const promises = batch.map(async (item) => {
          const buffer = await item.entry.async('arraybuffer');
          const ext = item.path.split('.').pop().toLowerCase();
          const mime = ext === 'jpg' ? 'image/jpeg' : `image/${ext}`;
          const dataURL = arrayBufferToDataURL(buffer, mime);
          const img = await loadImage(dataURL);
          return { name: item.path.split('/').pop(), img, dataURL };
        });
        const loaded = await Promise.all(promises);
        state.images.push(...loaded);
        status.textContent = `${state.images.length}/${imageFiles.length}`;
      }
    } else {
      for (let i = 0; i < files.length; i++) {
        const file = files[i];
        const dataURL = await new Promise((res, rej) => {
          const r = new FileReader();
          r.onload = () => res(r.result);
          r.onerror = rej;
          r.readAsDataURL(file);
        });
        const img = await loadImage(dataURL);
        state.images.push({ name: file.name, img, dataURL });
        status.textContent = `${state.images.length}/${files.length}`;
      }
    }

    updateUI();
    drawFrame(0);
    status.textContent = `${state.images.length} listas`;
  } catch (err) {
    status.textContent = 'Error';
  }
});

// === LOAD SUBS ===
document.getElementById('subInput').addEventListener('change', (e) => {
  const file = e.target.files[0];
  if (!file) return;
  const r = new FileReader();
  r.onload = (ev) => {
    state.subtitles = ev.target.result.split('\n')
      .map(l => l.trim())
      .filter(l => l)
      .map(l => {
        const [t, ...rest] = l.split('|');
        return { time: parseFloat(t) || 0, text: rest.join('|').trim() };
      })
      .sort((a, b) => a.time - b.time);
    status.textContent = `${state.subtitles.length} subs`;
    drawFrame(0);
  };
  r.readAsText(file);
});

// === OPTIONS ===
document.querySelectorAll('#durOptions .opt-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('#durOptions .opt-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    state.duration = parseInt(btn.dataset.val);
    updateUI();
  });
});

document.querySelectorAll('#fpsOptions .opt-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('#fpsOptions .opt-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    state.fps = parseInt(btn.dataset.val);
  });
});

// === UI ===
function updateUI() {
  document.getElementById('imgCount').textContent = `${state.images.length} imágenes`;
  const perFrame = state.images.length ? (state.duration / state.images.length).toFixed(2) : '—';
  document.getElementById('frameTime').textContent = `${perFrame}s/img`;
  placeholder.style.display = state.images.length ? 'none' : 'block';
  document.getElementById('timelineCount').textContent = state.images.length ? `(${state.images.length})` : '';
  renderTimeline();
  renderSequencer();
}

function renderTimeline() {
  timeline.innerHTML = '';
  if (!state.images.length) {
    timeline.innerHTML = '<div class="empty-timeline">Vacío</div>';
    return;
  }
  const maxShow = 50;
  const step = Math.max(1, Math.floor(state.images.length / maxShow));
  for (let i = 0; i < state.images.length; i += step) {
    const item = state.images[i];
    const div = document.createElement('div');
    div.className = 'thumb';
    div.innerHTML = `
      <img src="${item.dataURL}">
      <span class="num">${i + 1}</span>
      <button class="del" data-i="${i}">×</button>
    `;
    timeline.appendChild(div);
  }
  timeline.querySelectorAll('.del').forEach(b => {
    b.addEventListener('click', (e) => {
      e.stopPropagation();
      state.images.splice(parseInt(b.dataset.i), 1);
      updateUI();
      drawFrame(0);
    });
  });
}

// === SEQUENCER (drag & drop real) ===
function renderSequencer() {
  const seq = document.getElementById('seqTimeline');
  seq.innerHTML = '';
  document.getElementById('seqInfo').textContent = `${state.images.length} frames`;
  document.getElementById('seqTime').textContent = state.images.length ? `${state.duration}s @ ${state.fps}fps` : '—';

  if (!state.images.length) {
    seq.innerHTML = '<div class="empty-timeline">Sin frames</div>';
    return;
  }

  state.images.forEach((item, i) => {
    const div = document.createElement('div');
    div.className = 'thumb';
    div.draggable = true;
    div.dataset.idx = i;
    div.innerHTML = `
      <img src="${item.dataURL}">
      <span class="num">${i + 1}</span>
      <button class="del" data-i="${i}">×</button>
    `;
    seq.appendChild(div);
  });

  // Drag & drop
  let dragIdx = null;
  seq.querySelectorAll('.thumb').forEach(thumb => {
    thumb.addEventListener('dragstart', (e) => {
      dragIdx = parseInt(thumb.dataset.idx);
      thumb.classList.add('dragging');
    });
    thumb.addEventListener('dragend', () => {
      thumb.classList.remove('dragging');
      seq.querySelectorAll('.thumb').forEach(t => t.classList.remove('drag-over'));
    });
    thumb.addEventListener('dragover', (e) => {
      e.preventDefault();
      thumb.classList.add('drag-over');
    });
    thumb.addEventListener('dragleave', () => thumb.classList.remove('drag-over'));
    thumb.addEventListener('drop', (e) => {
      e.preventDefault();
      const dropIdx = parseInt(thumb.dataset.idx);
      if (dragIdx !== null && dragIdx !== dropIdx) {
        const [moved] = state.images.splice(dragIdx, 1);
        state.images.splice(dropIdx, 0, moved);
        updateUI();
        drawFrame(0);
      }
    });
  });

  seq.querySelectorAll('.del').forEach(b => {
    b.addEventListener('click', (e) => {
      e.stopPropagation();
      state.images.splice(parseInt(b.dataset.i), 1);
      updateUI();
      drawFrame(0);
    });
  });
}

document.getElementById('seqReverse').addEventListener('click', () => {
  if (!state.images.length) return;
  state.images.reverse();
  updateUI();
  drawFrame(0);
});

document.getElementById('seqClear').addEventListener('click', () => {
  if (!state.images.length) return;
  if (!confirm('¿Eliminar todos los frames?')) return;
  state.images = [];
  updateUI();
  drawFrame(0);
});

// === DRAW FRAME ===
function drawFrame(elapsed) {
  ctx.fillStyle = '#000';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  if (!state.images.length) return;

  const idx = Math.min(
    Math.floor((elapsed / state.duration) * state.images.length),
    state.images.length - 1
  );
  const img = state.images[idx].img;

  const scale = Math.max(canvas.width / img.width, canvas.height / img.height);
  const w = img.width * scale;
  const h = img.height * scale;
  const x = (canvas.width - w) / 2;
  const y = (canvas.height - h) / 2;
  ctx.drawImage(img, x, y, w, h);

  let activeSub = null;
  for (let i = 0; i < state.subtitles.length; i++) {
    const start = state.subtitles[i].time;
    const end = (i + 1 < state.subtitles.length) ? state.subtitles[i + 1].time : state.duration + 1;
    if (elapsed >= start && elapsed < end) {
      activeSub = state.subtitles[i].text;
      break;
    }
  }

  if (activeSub) {
    ctx.font = 'bold 36px -apple-system, sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'bottom';
    ctx.fillStyle = '#fff';
    ctx.strokeStyle = 'rgba(0,0,0,0.9)';
    ctx.lineWidth = 3;
    ctx.strokeText(activeSub, canvas.width / 2, canvas.height - 45);
    ctx.fillText(activeSub, canvas.width / 2, canvas.height - 45);
  }
}

// === GALLERY ===
function renderGallery() {
  const grid = document.getElementById('galleryGrid');
  if (!state.gallery.length) {
    grid.innerHTML = '<div class="gallery-empty">Sin videos aún</div>';
    return;
  }
  grid.innerHTML = '';
  state.gallery.forEach((item, i) => {
    const div = document.createElement('div');
    div.className = 'gallery-item';
    div.innerHTML = `
      <video src="${item.url}" controls></video>
      <div class="gallery-info">
        <span>${item.duration}s • ${item.size}</span>
        <button data-i="${i}">Descargar</button>
      </div>
    `;
    grid.appendChild(div);
  });
  grid.querySelectorAll('button').forEach(b => {
    b.addEventListener('click', () => {
      const item = state.gallery[parseInt(b.dataset.i)];
      const a = document.createElement('a');
      a.href = item.url;
      a.download = item.name;
      a.click();
    });
  });
}

document.getElementById('clearGallery').addEventListener('click', () => {
  if (!state.gallery.length) return;
  if (!confirm('¿Limpiar galería?')) return;
  state.gallery.forEach(g => URL.revokeObjectURL(g.url));
  state.gallery = [];
  renderGallery();
});

// === RENDER ===
document.getElementById('renderBtn').addEventListener('click', async () => {
  if (!state.images.length) {
    alert('Sube imágenes');
    return;
  }

  const btn = document.getElementById('renderBtn');
  btn.disabled = true;
  btn.textContent = 'Renderizando...';
  progress.classList.add('active');
  progressBar.style.width = '0%';

  const stream = canvas.captureStream(state.fps);
  let mimeType = 'video/webm;codecs=vp9';
  if (!MediaRecorder.isTypeSupported(mimeType)) mimeType = 'video/webm;codecs=vp8';
  if (!MediaRecorder.isTypeSupported(mimeType)) mimeType = 'video/webm';

  const recorder = new MediaRecorder(stream, {
    mimeType,
    videoBitsPerSecond: 5000000
  });

  const chunks = [];
  recorder.ondataavailable = (e) => {
    if (e.data && e.data.size > 0) chunks.push(e.data);
  };

  const renderPromise = new Promise((resolve) => {
    recorder.onstop = () => {
      const blob = new Blob(chunks, { type: 'video/webm' });
      resolve(blob);
    };
    recorder.onerror = () => resolve(null);
  });

  recorder.start();

  const startTime = performance.now();
  function loop(now) {
    const elapsed = (now - startTime) / 1000;
    const pct = Math.min((elapsed / state.duration) * 100, 100);
    progressBar.style.width = pct + '%';
    drawFrame(elapsed);
    if (elapsed >= state.duration) {
      drawFrame(state.duration - 0.01);
      setTimeout(() => recorder.stop(), 150);
      return;
    }
    requestAnimationFrame(loop);
  }
  requestAnimationFrame(loop);

  const videoBlob = await renderPromise;

  if (!videoBlob || videoBlob.size < 1000) {
    status.textContent = 'Error';
    resetBtn();
    return;
  }

  status.textContent = 'Comprimiendo...';
  progressBar.style.width = '100%';

  try {
    const zip = new JSZip();
    const stamp = Date.now();

    zip.file(`video_${state.duration}s.webm`, videoBlob);

    if (state.subtitles.length) {
      const subText = state.subtitles.map(s => `${s.time} | ${s.text}`).join('\n');
      zip.file('subtitulos.txt', subText);
    }

    const project = {
      duration: state.duration,
      fps: state.fps,
      totalFrames: state.images.length,
      subtitles: state.subtitles,
      createdAt: new Date().toISOString()
    };
    zip.file('proyecto.json', JSON.stringify(project, null, 2));

    const zipBlob = await zip.generateAsync(
      { type: 'blob', compression: 'DEFLATE', compressionOptions: { level: 6 } },
      (meta) => {
        status.textContent = `${meta.percent.toFixed(0)}%`;
      }
    );

    const url = URL.createObjectURL(zipBlob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `video_${state.duration}s_${stamp}.zip`;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);

    // Agregar a galería (solo el video, no el zip)
    const videoUrl = URL.createObjectURL(videoBlob);
    state.gallery.unshift({
      url: videoUrl,
      name: `video_${state.duration}s_${stamp}.webm`,
      duration: state.duration,
      size: (videoBlob.size / 1024 / 1024).toFixed(1) + 'MB'
    });

    setTimeout(() => URL.revokeObjectURL(url), 2000);
    status.textContent = `✓ ${(zipBlob.size / 1024 / 1024).toFixed(1)}MB`;
  } catch (err) {
    status.textContent = 'Error';
  }

  resetBtn();

  function resetBtn() {
    btn.disabled = false;
    btn.textContent = 'Renderizar';
    setTimeout(() => progress.classList.remove('active'), 1500);
  }
});

updateUI();
</script>
</body>
</html>
